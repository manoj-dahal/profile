<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audit Log · Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><h2>M.D</h2><span>Admin Console</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
      <a href="projects.html" class="nav-item"><span class="icon">📁</span> Projects</a>
      <a href="messages.html" class="nav-item"><span class="icon">✉️</span> Messages</a>
      <a href="analytics.html" class="nav-item"><span class="icon">📈</span> Analytics</a>
      <a href="users.html" class="nav-item"><span class="icon">👥</span> Users</a>
      <a href="settings.html" class="nav-item"><span class="icon">⚙️</span> Settings</a>
      <a href="audit.html" class="nav-item active"><span class="icon">📜</span> Audit Log</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1>Audit Log</h1>
      <div class="topbar-actions">
        <select id="actionFilter" class="input">
          <option value="">All actions</option>
          <option value="project.create">Project created</option>
          <option value="project.update">Project updated</option>
          <option value="project.delete">Project deleted</option>
          <option value="auth.login">Login</option>
        </select>
      </div>
    </header>

    <div class="content">
      <section class="card">
        <table class="data-table">
          <thead>
            <tr>
              <th>When</th>
              <th>User</th>
              <th>Action</th>
              <th>Resource</th>
              <th>Changes</th>
            </tr>
          </thead>
          <tbody id="auditBody">
            <tr><td colspan="5" class="text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

  <script type="module" src="js/audit-admin.js"></script>
</body>
</html>
