# Nginx configuration (alternative to Caddy)
# Place at /etc/nginx/sites-available/portfolio and symlink

# Rate limit zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# Upstream — the Node app
upstream portfolio_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name manoj-dahal.com.np www.manoj-dahal.com.np;
    return 301 https://manoj-dahal.com.np$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name manoj-dahal.com.np;

    # SSL (use certbot)
    ssl_certificate     /etc/letsencrypt/live/manoj-dahal.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manoj-dahal.com.np/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/portfolio.access.log;
    error_log  /var/log/nginx/portfolio.error.log;

    # Static files
    location /assets/ {
        alias /var/www/portfolio/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # API rate-limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://portfolio_app;
        proxy_http_version 1.1;
        proxy_set_header Connection          "";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
    }

    # Stricter limit for login
    location ~ ^/api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://portfolio_app;
    }

    # Everything else
    location / {
        proxy_pass http://portfolio_app;
        proxy_http_version 1.1;
        proxy_set_header Connection          "";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;
    }
}
