# Docker Compose for development
# Includes the app + hot-reload + adminer for DB inspection
#
# Usage:  docker compose -f infra/docker-compose.dev.yml up

version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
      target: builder
    image: portfolio-dev
    container_name: portfolio-dev
    command: node scripts/dev-server.js 3000
    volumes:
      - ..:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_PATH: /data/portfolio.db
      JWT_SECRET: dev-secret-change-me
    networks:
      - dev-net

  adminer:
    image: adminer:latest
    container_name: portfolio-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sqlite
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge
