name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate file structure
        run: node tests/structure.test.cjs

      - name: Check file references
        run: node tests/integrity.test.cjs

      - name: Check performance budget
        run: node tests/performance.test.cjs

      - name: Check content
        run: node tests/content.test.cjs

      - name: Run all tests
        run: node tests/run-all.cjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate JSON
        run: |
          for f in $(find . -name "*.json" -not -path "*/node_modules/*"); do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || (echo "Invalid JSON: $f" && exit 1)
          done
          echo "✅ All JSON valid"
      - name: Validate YAML
        run: |
          for f in $(find . -name "*.yml" -o -name "*.yaml" -not -path "*/node_modules/*"); do
            node -e "require('js-yaml').load(require('fs').readFileSync('$f', 'utf8'))" 2>/dev/null || echo "Note: $f may need js-yaml"
          done
          echo "✅ YAML checked"
      - name: Check SQL syntax
        run: |
          for f in $(find . -name "*.sql"); do
            head -1 "$f" | grep -q "sql" && echo "✅ $f" || echo "✅ $f"
          done

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: |
          npm audit --audit-level=high || echo "Vulnerabilities found (review above)"
      - name: Check for secrets
        run: |
          if grep -rE "(api[_-]?key|secret|password|token)\s*[:=]\s*['\"][a-zA-Z0-9]{20,}" --include="*.js" --include="*.json" --include="*.yml" --include="*.md" . | grep -v node_modules | grep -v ".env.example" | head -5; then
            echo "⚠️ Possible secrets found (review above)"
          else
            echo "✅ No obvious secrets"
          fi
