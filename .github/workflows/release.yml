name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: node tests/run-all.cjs

      - name: Create archive
        run: |
          mkdir -p dist
          tar --exclude='./node_modules' \
              --exclude='./.git' \
              --exclude='./dist' \
              --exclude='./.cache' \
              --exclude='./tests' \
              --exclude='./docs' \
              --exclude='./.github' \
              -czf dist/portfolio-${{ github.ref_name }}.tar.gz .

      - name: Create zip
        run: |
          cd ..
          zip -r portfolio/portfolio-${{ github.ref_name }}.zip portfolio/ \
            -x "portfolio/node_modules/*" \
            -x "portfolio/.git/*" \
            -x "portfolio/dist/*" \
            -x "portfolio/tests/*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: true
          files: |
            dist/portfolio-*.tar.gz
            portfolio-*.zip
          body: |
            ## 🎉 Release ${{ github.ref_name }}

            See [CHANGELOG.md](../blob/main/CHANGELOG.md) for details.

            ### Installation

            ```bash
            # Download and extract
            tar -xzf portfolio-${{ github.ref_name }}.tar.gz
            cd portfolio

            # Install deps
            npm install

            # Run dev server
            npm start
            ```
