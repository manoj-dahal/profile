name: Deploy Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate HTML
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html missing"
            exit 1
          fi
          echo "✅ index.html exists"

      - name: Check file structure
        run: |
          [ -d css ]      && echo "✅ css/"      || (echo "❌ css/ missing"      && exit 1)
          [ -d js ]       && echo "✅ js/"       || (echo "❌ js/ missing"       && exit 1)
          [ -d assets ]   && echo "✅ assets/"   || (echo "❌ assets/ missing"   && exit 1)
          [ -f css/styles.css ]  && echo "✅ css/styles.css"  || exit 1
          [ -f js/main.js ]      && echo "✅ js/main.js"      || exit 1

      - name: Validate JSON files
        run: |
          for f in package.json config/seo.json public/manifest.json assets/project.json; do
            if [ -f "$f" ]; then
              node -e "JSON.parse(require('fs').readFileSync('$f'))" && echo "✅ $f"
            fi
          done

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

